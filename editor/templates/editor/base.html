<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Editor{% endblock %} — Job Pipeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #1a1a1a;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 2rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      flex-shrink: 0;
      height: 48px;
    }

    .brand {
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: #fff;
      text-decoration: none;
      margin-right: 1.5rem;
    }
    .brand:hover { color: #ccc; }

    nav {
      display: flex;
      height: 100%;
      gap: 0;
    }

    nav a {
      display: flex;
      align-items: center;
      padding: 0 1rem;
      font-size: 0.875rem;
      color: #aaa;
      text-decoration: none;
      border-bottom: 2px solid transparent;
      height: 100%;
    }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; border-bottom-color: #2563eb; }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 2rem;
    }
  </style>
</head>
<body>

<header>
  <a class="brand" href="{% url 'jobs:table_browser' %}">← Jobs</a>
  <nav>
    <a href="{% url 'editor:edit_profile' %}" {% if active == 'profile' %}class="active"{% endif %}>Profile</a>
    <a href="{% url 'editor:competences' %}" {% if active == 'competences' %}class="active"{% endif %}>Competences</a>
    <a href="{% url 'editor:cover_letters' %}" {% if active == 'letters' %}class="active"{% endif %}>Cover Letters</a>
  </nav>
</header>

<main>
  {% block content %}{% endblock %}
</main>

</body>
</html>
