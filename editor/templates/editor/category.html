{% extends 'editor/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<style>
  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }

  h2 {
    font-size: 1.1rem;
    font-weight: 600;
  }

  /* ── Summary editor ── */
  .editor-section {
    margin-bottom: 1.75rem;
  }

  .section-label {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #666;
    margin-bottom: 0.5rem;
  }

  .editor-wrap {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
  }

  .editor-toolbar {
    display: flex;
    justify-content: flex-end;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid #eee;
    background: #fafafa;
  }

  textarea {
    display: block;
    width: 100%;
    min-height: 220px;
    padding: 0.85rem 1rem;
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    font-size: 0.875rem;
    line-height: 1.6;
    color: #1a1a1a;
    background: #fff;
    border: none;
    outline: none;
    resize: vertical;
    tab-size: 2;
  }
  textarea:focus { box-shadow: inset 0 0 0 2px rgba(37,99,235,0.2); }

  .save-btn {
    padding: 0.35rem 0.9rem;
    background: #2563eb;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
  }
  .save-btn:hover { background: #1d4ed8; }

  /* ── Subcategories ── */
  .subs-section {}

  .subs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.6rem;
  }

  .sub-list {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    align-items: center;
  }

  .sub-chip {
    padding: 0.35rem 0.85rem;
    background: #f0f4ff;
    border: 1px solid #c7d7ff;
    border-radius: 999px;
    font-size: 0.85rem;
    color: #1e40af;
    text-decoration: none;
  }
  .sub-chip:hover { background: #dbeafe; }

  .btn {
    padding: 0.35rem 0.8rem;
    border-radius: 4px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    border: none;
  }
  .btn-primary { background: #2563eb; color: #fff; }
  .btn-primary:hover { background: #1d4ed8; }

  .empty-subs {
    color: #999;
    font-size: 0.875rem;
  }
</style>

<div class="page-header">
  <h2>{{ title }}</h2>
</div>

<!-- Summary editor -->
<div class="editor-section">
  <p class="section-label">Summary</p>
  <form method="post">
    {% csrf_token %}
    <div class="editor-wrap">
      <div class="editor-toolbar">
        <button type="submit" class="save-btn">Save</button>
      </div>
      <textarea name="content_{{ slug }}" spellcheck="false" autocomplete="off">{{ content }}</textarea>
    </div>
  </form>
</div>

<!-- Subcategories -->
<div class="subs-section">
  <div class="subs-header">
    <p class="section-label">Subcategories</p>
    <a class="btn btn-primary" href="{% url 'editor:new_sub_competence' category=category_slug %}">+ New</a>
  </div>
  <div class="sub-list">
    {% for sub in subs %}
    <a class="sub-chip" href="{% url 'editor:edit_sub_competence' category=category_slug sub=sub.slug %}">{{ sub.label }}</a>
    {% empty %}
    <span class="empty-subs">No subcategories yet.</span>
    {% endfor %}
  </div>
</div>

{% endblock %}
